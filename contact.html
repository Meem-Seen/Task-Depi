<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Contact Page</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<section class="contact-section">

<div class="background"></div>

<h1 class="title">Get in Touch</h1>

<div class="contact-container">

<form class="contact-form" id="contactForm">

<h2>Send a Message</h2>

<div class="row">
<input type="text" id="firstName" name="firstName" placeholder="Enter your first name......" required>
<input type="text" id="lastName" name="lastName" placeholder="Enter your last name......" required>
</div>

<div class="row">
<input type="email" id="email" name="email" placeholder="Ex: john@email.com" required>
<input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
</div>

<textarea id="message" placeholder="Write your message here..."></textarea>

<button type="submit">Send</button>

</form>


<div class="contact-info">

<h3>Contact Info</h3>

<p>📍 Cairo , Egypt</p>
<p>✉ loremipsum@email.com</p>
<p>📞 01023456789</p>

<div class="map">
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d55251.378094222026!2d31.217264594617312!3d30.059482028200886!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14583fa60b21beeb%3A0x79dfb296e8423bba!2sCairo%2C%20Cairo%20Governorate!5e0!3m2!1sen!2seg!4v1773539622206!5m2!1sen!2seg" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>
</div>

</div>

</section>
<script src="assets/js/script.js"></script>

</body>
</html>
