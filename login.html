<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>FoodMart Login</title>
</head>
<body>
    <div class="continar_login">
        <div class="login_form">
            <div class="brand_header">
                <div class="icon_box">
                    <i class="fa-solid fa-cart-shopping"></i> 
                </div>
                <div class="logo_img">
                    <img src="./assets/imgs/image.png" alt="FoodMart Logo">
                </div>
                <p class="subtitle">Sign in Your Account</p>
            </div>
            
            <form id="loginForm">
                <div class="input_group">
                    <input type="email" name="e_mail" placeholder="Enter Your E-mail" id="e_mail" class="in_field" required>
                    <input type="password" name="pasword" placeholder="Enter Your password" id="pass" class="in_field" required>
                </div>

                <p id="errorMessage" class="show_error"></p>

                <div class="helper_links">
                    <div class="remember_me">
                        <input type="checkbox" id="check">
                        <label for="check">Remember Me</label>
                    </div>
                    <a href="#" class="forgot_link">Forget Password?</a>
                </div>

                <button type="submit" class="submit_btn">Sign In</button>

                <div class="or_divider">
                    <span>Or continue with</span>
                </div>

                <div class="social_container">
                    <a href="https://accounts.google.com/signin" target="_blank" class="social_btn">
                        <img src="./assets/imgs/google-logo.webp" alt="Google"> Google
                    </a>
                    <a href="https://www.facebook.com/login" target="_blank" class="social_btn">
                        <img src="./assets/imgs/facebook-logo.avif" alt="Facebook"> Facebook
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
      
            event.preventDefault();

            const email = document.getElementById('e_mail').value;
            const password = document.getElementById('pass').value;
            const errorDisplay = document.getElementById('errorMessage');

       
            if (!email.includes('@')) {
                showError("The email must contain the '@' symbol.");
                return;
            }

            if (password.length > 8) {
                showError("Password is too long! Max 8 characters.");
                return;
            }

           
            errorDisplay.style.display = 'none';
            alert("Login Successful! Welcome to FoodMart.");
        
        });

   
        function showError(message) {
            const errorDisplay = document.getElementById('errorMessage');
            errorDisplay.innerText = message;
            errorDisplay.style.display = 'block';
        }
    </script>
</body>
</html>
