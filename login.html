<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/regestration.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>FoodMart Login</title>
</head>
<body>
    <div class="continar_login">
        <div class="login_form">
            <div class="brand_header">
                <div class="icon_box">
                    <i class="fa-solid fa-cart-shopping"></i> 
                </div>
                <div class="logo_img">
                    <img src="logo.png" alt="FoodMart Logo">
                </div>
                <p class="subtitle">Sign in Your Account</p>
            </div>
            
            <form id="loginForm">
                <div class="input_group">
                    <input type="email" name="e_mail" placeholder="Enter Your E-mail" id="e_mail" class="in_field" required>
                    <input type="password" name="pasword" placeholder="Enter Your password" id="pass" class="in_field" required>
                </div>

                <p id="errorMessage" class="show_error"></p>

                <div class="helper_links">
                    <div class="remember_me">
                        <input type="checkbox" id="check">
                        <label for="check">Remember Me</label>
                    </div>
                    <a href="#" class="forgot_link">Forget Password?</a>
                </div>

                <button type="submit" class="submit_btn">Sign In</button>

                <div class="or_divider">
                    <span>Or continue with</span>
                </div>

                <div class="social_container">
                    <a href="https://accounts.google.com/signin" target="_blank" class="social_btn">
                        <img src="google-logo.webp" alt="Google"> Google
                    </a>
                    <a href="https://www.facebook.com/login" target="_blank" class="social_btn">
                        <img src="facebook-logo.avif" alt="Facebook"> Facebook
                    </a>
                </div>
            </form>
        </div>
    </div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const email = document.getElementById('e_mail').value;
        const password = document.getElementById('pass').value;
        const errorDisplay = document.getElementById('errorMessage');

        const emailRegex = /^[a-zA-Z0-9._]+@(gmail|yahoo|outlook)\.(com|net|org)$/;
        const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

        if (!emailRegex.test(email) || !passwordRegex.test(password)) {
            showError("Invalid Email or Password format.");
            return;
        }

        let storedData = localStorage.getItem('Users');
        let usersList = storedData ? JSON.parse(storedData) : [];

        const foundUser = usersList.find(user => user.email === email && user.password === password);

        if (foundUser) {
            errorDisplay.style.display = 'none';
            alert("Login Successful! Welcome back, " + foundUser.name);
            localStorage.setItem('currentUser', JSON.stringify(foundUser));
            window.location.href = "index.html"; 
        } else {
           
            errorDisplay.innerHTML = 'Account not found. <a href="signup.html" style="color: red; text-decoration: underline;">Sign Up here</a>';
            errorDisplay.style.display = 'block';
        }
    });

   
    function showError(message) {
        const errorDisplay = document.getElementById('errorMessage');
        errorDisplay.innerText = message; 
        errorDisplay.style.display = 'block';
    }
</script>
</body>
</html>
